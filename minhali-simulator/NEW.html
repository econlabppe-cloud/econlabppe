  // 4624: 4% מהשכר הכולל (בסיס + ותק) — זכאי לכל עובד מינהלי (פרמטר 4% אוניברסלי).
  const c4624 = amt4624 ? r2(amt4624) : r2(base * 0.04);
  const c4983 = r2((mgmtUnits||0)*105);
  const c0647 = inc0647 ? CODE0647 : 0;
  const resolvedOfficeCode = resolveOfficeProfile(officeCode);
  // [Codex/Copilot]: רכיבי משרד עוברים כאן בשתי שכבות: קודם כל מה שמשפיע על 4550/4544, ורק אחר כך רכיבים שנגזרים מבסיסים מאוחרים כמו 5401.
  const officeActiveDefs = OFFICE_EXTRA_DEFS
    .filter(def => (officeExtras && officeExtras[def.code]) || def.mandatory)
    .filter(def => !def.offices || def.offices.includes(resolvedOfficeCode));
  const officePreStageEntries = officeActiveDefs
    .filter(def => def.kind !== 'rateFromStage')
    .map(def => ({
      ...def,
      amount: calcOfficeExtraAmount(def, resolvedOfficeCode, { baseSalary: r2(base + c4624), year, tax741Units, pop1198Days, pop1226Days, pop1275Days })
    }))
    .filter(def => def.amount > 0);
  const officeChainEntries = officePreStageEntries.filter(def => def.reduces4550 || def.includeIn4544 || def.includeIn4934 || def.includeIn4994);
  const officeFlatEntries = officePreStageEntries.filter(def => !officeChainEntries.includes(def));
  const officeReduce4550 = r2(officePreStageEntries.filter(def => def.reduces4550).reduce((sum, def) => sum + def.amount, 0));
  const officeFor4544 = r2(officePreStageEntries.filter(def => def.includeIn4544).reduce((sum, def) => sum + def.amount, 0));
  const officeFor4934 = r2(officePreStageEntries.filter(def => def.includeIn4934).reduce((sum, def) => sum + def.amount, 0));
  const officeFor4994 = r2(officePreStageEntries.filter(def => def.includeIn4994).reduce((sum, def) => sum + def.amount, 0));
  // 4550 = MAX(22%×(base+4624), תקרת סל) - supplements; תקרת סל: 1001.49 לבתי משפט/אכיפה, 714.70 לכלל המשרדים
  const c4550TotalSlot = C4550_TOTAL_SLOT[resolvedOfficeCode] || C4550_FLOOR_DEFAULT;
  const c4550Base = r2((base + c4624) * 0.22);
  const c4550 = r2(Math.max(Math.max(c4550Base, c4550TotalSlot) - officeReduce4550, 0));
  const fixedChainBase = r2(base+c4983+c0647+c667+c897+c4147+c1961+c1967+c4624+c4550);
  // b4544 כולל את כל רכיבי 165 הקבועים — כולל גמולים ורפורמה
  const b4544 = r2(fixedChainBase + officeFor4544);
  const c4544 = r2(b4544*.036);
  const b4934 = r2(fixedChainBase + officeFor4934 + c4544);
  const c4934 = r2(b4934*.05);
  const b4994 = r2(fixedChainBase + officeFor4994 + c4544 + c4934);
  const c4994 = r2(b4994*.0725);
  const b5401 = r2(b4994+c4994);
  const c5401 = r2(b5401*.03875);
  const b5533 = r2(b5401+c5401);
  const c5533 = r2(b5533*.035);
  const officePostStageEntries = officeActiveDefs
    .filter(def => def.kind === 'rateFromStage')
    .map(def => ({
      ...def,
      amount: calcOfficeExtraAmount(def, resolvedOfficeCode, { baseSalary: base, year, b4544, b4934, b4994, b5401, b5533, tax741Units, pop1198Days, pop1226Days, pop1275Days })
    }))
    .filter(def => def.amount > 0);
  const officeExtraEntries = [...officePreStageEntries, ...officePostStageEntries];
  const officeExtraTotal = r2(officeExtraEntries.reduce((sum, def) => sum + def.amount, 0));
  const officeFlatOnly = r2(officeFlatEntries.reduce((sum, def) => sum + def.amount, 0));
  const officeAfter5401 = r2(officePostStageEntries.reduce((sum, def) => sum + def.amount, 0));
  // [Codex/Copilot]: 1699 נמדד מול השכר המשולב (0002+0003), לא רק מול שכר היסוד.
  const minBase = r2(base+c4983+c0647+c667+c897+c4147+c1961+c1967+c4624+c4550+officeFor4544+c4544);
  const c1699 = r2(Math.max(0,MIN1699-minBase));
  const c5402 = cfg.code5402;
  // 5524: 400 לבתי משפט (126), 500 לכלל המשרדים
  const c5524 = (resolvedOfficeCode === '126') ? 400.00 : CODE5524;

  add('0002','שכר יסוד',v0002);
  add('0003','תוספת ותק',v0003);
  add('4983','גמול מנהל',c4983);
  add('0647','גמול מנהל מחלקה א׳',c0647);
  add('0667','גמול השתלמות א׳',c667);
  add('0897','גמול השתלמות ב׳',c897);
  add('4147','תוספת רפורמה',c4147);
  add('1961','רפורמה ב׳ (1961)',c1961);
  add('1967','רפורמה ב׳ (1967)',c1967);
  add('4624','תוספת 4%',c4624);
  add('4550','תוספת 2001',c4550);
  officeChainEntries.forEach(def => add(def.code, def.label, def.amount));
  add('4544','ת. שכר 3.6%',c4544);
  add('4934','תוספת 2009',c4934);
  add('4994','תוספת 2011',c4994);
  add('5401','2016-נטו',c5401);
  add('5402','שקל 2016-נטו',c5402);
  add('5524','תוס-2023',c5524);
  add('5533','תוספת אחידה 2024',c5533);
  // [Codex/Copilot]: 4643 מטופל כרכיב חייב שמופיע אחרי שרשרת 4544/4934/4994 ולא מזין אותה.
  add('4643','השלמת שכר',amt4643||0);
  officeFlatEntries.forEach(def => add(def.code, def.label, def.amount));
  officePostStageEntries.forEach(def => add(def.code, def.label, def.amount));
  add('1699','תוספת חוק',c1699);

  const grossFixed = sumFlag('base165');
  const hourly = r2(grossFixed/MONTHLY_HOURS);

  // Work
  const w1100 = add('1100','שעות נוספות 100%', (ot100||0)*hourly);
  const w1125 = add('1125','שעות נוספות 125%', (ot125||0)*hourly*1.25);
  const w1150 = add('1150','שעות נוספות 150%', (ot150||0)*hourly*1.5);
  const oncallPay = add('1205','ג. כוננות', (oncall||0)*hourly);
  const w1210 = add('1210','עבודה נוספת', amt1210||0);
  const w1023 = add('1023','גמול חיפוש', (taxSearchUnits||0)*78.53);
  const w4322 = add('4322','רכיב דיפרנציאלי', diff4322||0);
  const amt4425 = add('4425','מענק יובל', b4425||0);
  const amt5288 = add('5288','מענק מיוחד', b5288||0);
  const workTotal = r2(sumFlag('base166') - amt4425 - amt5288);

  // Expenses
  // [Codex/Copilot]: מהתלושים עלה ש-0700/0750 מתנהגים כסכום רמה ישיר, לא כמכפלת "יחידות" בקבוע רוחבי.
  const exp0700 = add('0700','קרן שעות רכב', u0700||0);
  const exp0750 = add('0750','הוצאות רכב קבועות', u0750||0);
  const exp1034 = add('1034','משתנות רגלי נטו', (q1034||0)*0.68);
  const exp1491 = add('1491','רכיב נטו', amt1491||0);
  const exp1492 = add('1492','רכיב נטו', amt1492||0);
  const exp1493 = add('1493','רישוי נטו', amt1493||0);
  const exp1700 = add('1700','דמי כלכלה', (days1700||0)*(econRate||21.10));
  const exp4985 = add('4985','קצובת כלכלה רשות המסים', (taxEconomyDays||0)*36.30);
  const exp0560 = add('0560','קצובת נסיעה', travel||0);
  const expTotal = sumFlag('base167');

  // Family
  const isMom = gender==='female';
  const basePoints = isMom ? 2.75 : 2.25;
  const degreePoints = hasDegree ? 1 : 0;
  const ages = Array.isArray(childrenAges)?childrenAges:[];
  const childrenPoints = r2(ages.reduce((sum,{age,count}) => sum + childPts(age,isMom)*(count||1), 0));
  const reservePoints = miluimPts(miluimDays||0);
  const manualTaxPoints = Math.max(0, Number(extraTaxPoints)||0);
  const pts = r2(basePoints + degreePoints + childrenPoints + reservePoints + manualTaxPoints);
  const under5 = ages.filter(c=>c.age<=4).reduce((s,c)=>s+(c.count||1),0);
  const maonotCount = inclMaonot&&!partnerMaonot ? Math.min(under5,MAX_MAONOT) : 0;
  const maonotPay = add('MAONOT','תוספת מעונות', maonotCount*MAONOT_PER_CHILD);

  // Bases from classification
  const base165 = sumFlag('base165');
  const base4150 = sumFlag('base4150');
  const base166 = sumFlag('base166');
  const base167 = sumFlag('base167');

  const c4112 = r2(components.filter(c=>c.work4112).reduce((s,c)=>s+c.amount,0) * cfg.rate4150);
  const code4150 = r2(base4150 * cfg.rate4150);
  const code4854 = r2(components.filter(c=>c.extra4150).reduce((s,c)=>s+c.amount,0) * cfg.rate4150);
  const red4970 = 0;
  const base164 = r2(base165-code4150-code4854-red4970);

  const positiveTaxExProt = sumFlagExceptH11('taxable');
  const positiveNiExProt  = sumFlagExceptH11('ni');
  const positiveDuesExProt= sumFlagExceptH11('dues');
  const protGross = sumFlag('h11');
  const protTax = protGross;
  const protNi = protGross;

  const grossNoH11 = r2(base165 + base166 + base167 + maonotPay - c4112 - code4150 - code4854 - red4970);
  const taxBaseWithoutProtected = r2(positiveTaxExProt - c4112 - code4150 - code4854 - red4970);
  const niBaseWithoutProtected = r2(positiveNiExProt - c4112 - code4150 - code4854 - red4970);
  const duesBaseWithoutProtected = r2(positiveDuesExProt - c4112 - code4150 - code4854 - red4970);

  const dr = Number(duesRate||0);
  const h11 = solveH11(taxBaseWithoutProtected, niBaseWithoutProtected, duesBaseWithoutProtected, protTax, protNi, protGross, pts, dr, cfg);
  add('H11','גילום מס על הוצאות', h11, { taxable:true, ni:true, dues:true });

  const gross = r2(grossNoH11+h11);
  const taxBase = r2(taxBaseWithoutProtected + protTax + h11);
  const base310 = r2(Math.min(cfg.niCeil, niBaseWithoutProtected + protNi + h11));
  const duesBaseRaw = r2(duesBaseWithoutProtected + protGross + h11);
  const duesBase = r2(Math.min(DUES_CAP, duesBaseRaw));

  const incomeTax = calcTax(taxBase, pts, cfg);
  const ni = calcNI(base310, cfg);
  const pensionDed = r2(base165*.07);
  const studyFundDed = r2(base164*.025);
  const code2200 = r2(base165*.02);
  const code5 = r2(base167*.05);
  const code7 = r2(base166*.07);
  const code25 = r2(base164*.025);
  const dues = r2(duesBase*dr);
  const mutual2310 = hasMutual ? 21.30 : 0;
  const vaad7546 = r2(base165*.004);
  const totalDed = r2(incomeTax+ni+pensionDed+studyFundDed+code2200+code5+code7+code25+dues+mutual2310+vaad7546);
  const net = r2(gross-totalDed);

  // Economic value
  const recYrs = recoveryYrs||sen.yr||0;
  const recD = recDays(recYrs);
  const recPay = r2(recD*RECOVERY_RATE/12);
  const insRefund = inclInsRefund ? r2(Math.min(insuranceCost||0,INS_REFUND_CAP)/12) : 0;
  const regRefund = inclRegRefund ? r2(Math.min(vehicleRegFee||0,REG_REFUND_CAP)/12) : 0;
  const empPension = r2(base165*0.135);
  const empStudy = r2(base164*0.075);
  const jubileeMonthly = sen.yr > 30 ? r2(base165 * 0.60 / 12) : 0;
  let econVal = net;
  if(inclRec)   econVal+=recPay;
  if(inclCloth) econVal+=CLOTHING;
  if(inclGifts) econVal+=GIFTS;
  if(inclCibus) econVal+=r2(CIBUS_DAILY*20);
  if(inclPhone) econVal+=PHONE;
  econVal+=insRefund+regRefund;
  if(inclStudyFund) econVal+=empStudy;
  if(inclPension)   econVal+=empPension;
  if(jubileeMonthly>0) econVal+=jubileeMonthly;

  return { components,
    v0002,v0003,base,c4983,c0647,c667,c897,c4147,c1961,c1967,c4550,c4544,c4934,c4994,c5401,c5402,c5524,c5533,c1699,
    minBase,grossFixed,hourly,b4544,b4934,b4994,b5401,b5533,
    w1100,w1125,w1150,oncallPay,w1023,w4322,workTotal,
    exp0560,exp0700,exp0750,exp1034,exp1492,exp1493,exp1700,exp4985,expTotal,
    maonotPay,maonotCount,under5,officeExtraTotal,officeReduce4550,officeFor4544,officeFor4934,officeFor4994,officeFlatOnly,officeAfter5401,resolvedOfficeCode,b4425:amt4425,b5288:amt5288,
    base165,base166,base167,base164,base310,duesBase,h11,protGross,code4150,code4854,c4112,code2200,
    incomeTax,ni,pensionDed,studyFundDed,code5,code7,code25,dues,mutual2310,vaad7546,
    totalDed,net,gross,taxBase,pts,basePoints,degreePoints,childrenPoints,reservePoints,extraTaxPoints:manualTaxPoints,recD,recPay,empPension,empStudy,insRefund,regRefund,econVal,
    jubileeMonthly,
    miluimPoints:miluimPts(miluimDays||0)
  };
}

const ChildrenInput = ({childrenAges, setChildrenAges, gender}) => {
  const [showAdd, setShowAdd] = useState(false);
  const [newAge, setNewAge] = useState(0);
  const isMom = gender==='female';
  const cpUI = a=>a===0?2.5:a<=2?4.5:a===3?3.5:a<=5?2.5:a<=17?(isMom?2:1):a===18?(isMom?.5:0):0;
  const add = () => {
    const age=Number(newAge);
    if(age<0||age>18) return;
    const ex=childrenAges.find(c=>c.age===age);
    if(ex) setChildrenAges(childrenAges.map(c=>c.age===age?{...c,count:c.count+1}:c));
    else   setChildrenAges([...childrenAges,{age,count:1}].sort((a,b)=>a.age-b.age));
    setShowAdd(false);
  };
  return (
    <div className="mb-4">
      <div className="flex items-center justify-between mb-2">
        <label className="text-sm font-semibold text-slate-700">ילדים — נקודות זיכוי לפי גיל</label>
        <button onClick={()=>setShowAdd(!showAdd)} className="text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-semibold transition-all">+ הוסף ילד</button>

                      <div className="text-xs text-slate-500">תקרה: {fmt(REG_REFUND_CAP)} ₪/שנה • החזר חודשי: <strong>{fmt(R.regRefund)} ₪</strong></div>
                    </div>

                  </div>
                  {inclReg&&<input type="number" min="0" max={REG_REFUND_CAP} value={vehicleRegFee} onChange={e=>setRegFee(Math.min(Number(e.target.value),REG_REFUND_CAP))}
                    placeholder={`אגרה שנתית (עד ${fmt(REG_REFUND_CAP)} ₪)`}
                    className="w-full border-2 border-blue-300 rounded-xl py-2 px-3 font-semibold focus:ring-2 focus:ring-blue-400 bg-white"/>}
                </div>
                {(inclIns||inclReg)&&<div className="flex justify-between items-center bg-blue-100 rounded-xl px-3 py-2">
                  <span className="text-sm font-semibold text-blue-900">סה״כ החזר חודשי</span>
                  <span className="font-extrabold text-blue-900">{fmt(R.insRefund+R.regRefund)} ₪</span>
                </div>}
              </div>
            </div>

            <BenefitToggle label={`קה״ש מעסיק (7.5% מ-164)`} sub={`${fmt(R.base164)} ₪ × 7.5%`} value={R.empStudy} on={inclStudy} onToggle={()=>setInclStudy(!inclStudy)}/>
            <BenefitToggle label={`פנסיה מעסיק (13.5% מ-165)`} sub={`${fmt(R.base165)} ₪ × 13.5%`} value={R.empPension} on={inclPension} onToggle={()=>setInclPens(!inclPension)}/>

            {/* TOTAL */}
            <div className="mt-4 p-4 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl text-white">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-emerald-100 text-sm mb-1">שווי כלכלי כולל</div>
                  <div className="text-3xl font-bold">{fmt(R.econVal)} ₪</div>

                <Ico.Trend c="w-16 h-16 text-emerald-200 opacity-40"/>

            </div>
          </div>
        </Card>

        {/* ── סיכום שנתי ── */}
        <Card className="p-5 bg-gradient-to-br from-violet-50 to-purple-50 border-violet-200">
          <SectionTitle icon={Ico.Cal} title="סיכום שנתי"/>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {[
              {label:'נטו שנתי',val:R.net*12,clr:'text-violet-700',bg:'border-violet-200'},
              {label:'שווי כלכלי שנתי',val:R.econVal*12,clr:'text-emerald-600',bg:'border-emerald-200'},
              {label:'חיסכון שנתי פנסיה',val:(R.pensionDed+R.empPension)*12,clr:'text-blue-600',bg:'border-blue-200',sub:'עובד + מעסיק'},
              {label:'חיסכון שנתי קה״ש',val:(R.studyFundDed+R.empStudy)*12,clr:'text-indigo-600',bg:'border-indigo-200',sub:'עובד + מעסיק'},
            ].map((s,i)=>(
              <div key={i} className={`bg-white rounded-xl p-4 border-2 ${s.bg}`}>
                <div className="text-sm text-slate-600 mb-1">{s.label}</div>
                <div className={`text-3xl font-bold ${s.clr}`}>{fmt(s.val)} ₪</div>
                {s.sub&&<div className="text-xs text-slate-500 mt-1">{s.sub}</div>}
              </div>
            ))}
          </div>
        </Card>
        </>}{/* /payslip tab */}

        {/* ══ RETRO TAB ══ */}
        {proTab==='retro' && (
          <Card className="p-5">
            <RetroPanel baseParams={params}/>
          </Card>
        )}

        {/* ══ COMPARE TAB ══ */}
        {proTab==='compare' && (
          <Card className="p-5">
            <ScenarioCompare baseParams={params} baseResult={R}/>
          </Card>
        )}

        {/* ══ EXPLORER TAB ══ */}
        {proTab==='explorer' && (
          <Card className="p-5">
            <ComponentExplorer result={R}/>
          </Card>
        )}

      </div>{/* /right column */}
      </div>

      <ValidationPanel />

      {/* ── CONTACT CARD ── */}
      <div id="contact-anchor">
        <div className={`bg-gradient-to-br ${ACCENT} rounded-2xl shadow-xl overflow-hidden`}>
          <div className="px-6 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="text-white text-right">
              <div className="text-base font-extrabold mb-0.5">יהודה סעדיה</div>
              <div className="text-xs opacity-75">יוצר המחשבון • לשאלות, הצעות ושיתופי פעולה</div>
            </div>
            <div className="flex flex-wrap items-center justify-center gap-2">
              {[
                {href:"mailto:yehoda.sadaay@gmail.com",icon:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>,label:'מייל',sub:'yehoda.sadaay@gmail.com'},
                {href:"tel:0506202972",icon:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>,label:'טלפון',sub:'050-620-2972'},

    </div>{/* /max-w */}

    {/* ── PAYSLIP MODAL ── */}
    {showPayslip && <PayslipModal R={R} vatek={vatek} gradeKey={gradeKey} onClose={()=>setShowPayslip(false)}/>}

    <StickyBar R={R} ACCENT={ACCENT}/>

    </div>

}

const PayslipModal = ({R, vatek, gradeKey, onClose}) => {
  const now = new Date();
  const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const monthStr = months[now.getMonth()] + " " + now.getFullYear();
  const f = n => Math.abs(Math.round(n||0)).toLocaleString("he-IL");
  const ff = n => Math.abs(Number(n||0)).toFixed(2);
  const gradeLabel = (GRADE_OPTIONS.find(g=>g[0]===gradeKey)||['',''])[1];

  useEffect(()=>{
    const s=document.createElement("style");
    s.id="ps-print";
    s.innerHTML=`@media print{body>*{display:none!important}#ps-root{display:block!important;position:static!important;overflow:visible!important;background:white!important;height:auto!important}#ps-root .bg-black\/70{background:white!important;position:static!important;overflow:visible!important}#ps-root .fixed{position:static!important;overflow:visible!important}#ps-root .bg-white{box-shadow:none!important}.no-print{display:none!important}@page{margin:1cm;size:A4}}`;
    document.head.appendChild(s);
    return()=>{const e=document.getElementById("ps-print");if(e)e.remove();};
  },[]);

  const TR = ({children,cls=""}) => <tr className={cls}>{children}</tr>;
  const TH = ({ch,cls=""}) => <th className={"py-1.5 px-2 text-right text-xs font-bold text-gray-500 border-b border-gray-200 bg-gray-50 "+cls}>{ch}</th>;
  const TD = ({ch,cls=""}) => <td className={"py-1.5 px-2 text-xs border-b border-gray-100 "+cls}>{ch}</td>;

  // Section header row
  const SH = ({title,total,color="bg-blue-50"}) => (
    <TR>
      <td colSpan={5} className={`py-1.5 px-3 ${color} border-b border-gray-200`}>
        <div className="flex justify-between items-center">
          <span className="text-xs font-black text-gray-700">{title}</span>
          {total!==undefined && <span className="text-xs font-bold text-gray-600">סה״כ: {f(total)} ₪</span>}
        </div>
      </td>
    </TR>
  );

  // Payment row
  const PR = ({code,name,qty,rate,total,hi=false,neg=false,note=null}) => (
    <TR cls={hi?"bg-blue-50 font-bold":"hover:bg-gray-50"}>
      <TD ch={code||""} cls="text-blue-500 font-mono text-xs font-bold w-12"/>
      <TD ch={<div>{name}{note&&<div className="text-gray-400 text-xs">{note}</div>}</div>} cls={hi?"font-bold text-gray-900":"text-gray-800"}/>
      <TD ch={qty||""} cls="text-center text-gray-500 w-16 tabular-nums"/>
      <TD ch={rate||""} cls="text-center text-gray-500 w-20 tabular-nums"/>
      <TD ch={(neg?"−":"")+f(Math.abs(total||0))+" ₪"} cls={"text-left font-bold w-20 tabular-nums "+(neg?"text-red-600":hi?"text-blue-800":"text-gray-800")}/>
    </TR>
  );

  // Deduction row
  const DR = ({code,name,pct,base,total,note=null}) => (
    <TR cls="hover:bg-gray-50">
      <TD ch={code||""} cls="text-red-400 font-mono text-xs font-bold w-12"/>
      <TD ch={<div>{name}{note&&<div className="text-gray-400 text-xs">{note}</div>}</div>} cls="text-gray-800"/>
      <TD ch={pct?pct+"%":""} cls="text-center text-gray-500 w-16 tabular-nums"/>
      <TD ch={base||""} cls="text-center text-gray-500 w-20 tabular-nums"/>
      <TD ch={"−"+f(total||0)+" ₪"} cls="text-left font-bold text-red-600 w-20 tabular-nums"/>
    </TR>
  );

  // Employer row (no minus)
  const ER = ({name,pct,base,total}) => (
    <TR cls="hover:bg-gray-50">
      <TD ch="" cls="w-12"/>
      <TD ch={name} cls="text-gray-700"/>
      <TD ch={pct?pct+"%":""} cls="text-center text-gray-500 w-16"/>
      <TD ch={base||""} cls="text-center text-gray-500 w-20 tabular-nums"/>
      <TD ch={f(total||0)+" ₪"} cls="text-left font-semibold text-emerald-700 w-20 tabular-nums"/>
    </TR>
  );

  const workTotal = r2(R.w1100+R.w1125+R.w1150+R.oncallPay+R.w4322);
  const chainTotal = r2(R.grossFixed - R.v0002 - R.v0003);

  return (
    <div id="ps-root" className="fixed inset-0 bg-black/70 z-50 flex items-start justify-center overflow-y-auto p-2 sm:p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-4" onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="bg-gradient-to-l from-blue-900 to-indigo-900 text-white px-5 py-4 rounded-t-2xl">
          <div className="flex justify-between items-start mb-3">
            <div>
              <div className="text-base font-black">תלוש שכר — סימולציה</div>
              <div className="text-blue-300 text-xs mt-0.5">דירוג מינהלי | דרגה {gradeLabel}</div>
            </div>
            <div className="text-left">
              <div className="text-xs text-blue-300">חודש</div>
              <div className="font-bold text-sm">{monthStr}</div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 text-xs border-t border-white/20 pt-3">
            <div><span className="text-blue-300">ותק: </span><span className="font-semibold">{vatek}</span></div>
            <div><span className="text-blue-300">ערך שעה: </span><span className="font-semibold">{ff(R.hourly)} ₪</span></div>
            <div><span className="text-blue-300">נקודות זיכוי: </span><span className="font-semibold">{R.pts?.toFixed(2)}</span></div>
          </div>
        </div>

        {/* ─── TABS ─── */}
        <PayslipTabs R={R} f={f} ff={ff} PR={PR} DR={DR} ER={ER} SH={SH} TR={TR} TD={TD} TH={TH} workTotal={workTotal} chainTotal={chainTotal}/>

        {/* Footer */}
        <div className="no-print px-5 pb-5 flex gap-3 justify-center border-t border-gray-100 pt-4">
          <button onClick={()=>{
            const s=document.createElement("style");s.id="po";
            s.innerHTML="body>*{display:none!important}#ps-root{display:block!important;position:static!important;overflow:visible!important;background:white!important;height:auto!important}#ps-root .fixed{position:static!important}#ps-root .bg-black\/70{background:none!important;position:static!important}.no-print{display:none!important}";
            document.head.appendChild(s);window.print();
            setTimeout(()=>{const e=document.getElementById("po");if(e)e.remove();},1000);
          }} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-md transition-all">
            🖨 הדפס / שמור PDF
          </button>
          <button onClick={onClose} className="px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition-all">✕ סגור</button>
        </div>
      </div>
    </div>
  );
};

// Tabs component (inside modal) — פירוט תלוש + הסבר ידידותי
const PayslipTabs = ({R, f, ff, PR, DR, ER, SH, TR, TD, TH, workTotal, chainTotal}) => {
  const [tab, setTab] = useState("slip");

  return (
    <div>
      {/* Tab buttons */}
      <div className="flex gap-0 border-b border-gray-200 bg-gray-50">
        {[
          {id:"slip", label:"📋 תלוש לפי סמלים"},
          {id:"bases", label:"📐 בסיסי חישוב"},
          {id:"explain", label:"💡 הסבר ידידותי"},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`px-4 py-3 text-sm font-bold border-b-2 transition-all ${tab===t.id?'border-blue-600 text-blue-700 bg-white':'border-transparent text-gray-500 hover:text-gray-700'}`}>

          </button>

      </div>

      {/* ── TAB 1: תלוש ── */}
      {tab==="slip" && (
        <div className="overflow-x-auto" dir="rtl">
          {/* תשלומים */}

            <div className="text-xs font-black text-gray-700 border-b-2 border-gray-400 pb-1">תשלומים</div>

            <tbody>
              <SH title="שכר בסיסי ותוספות" total={R.grossFixed} color="bg-blue-50"/>
              <PR code="0002" name="שכר יסוד" qty="—" rate={f(R.v0002)+" ₪"} total={R.v0002}/>
              <PR code="0003" name="תוספת ותק" qty="—" rate="—" total={R.v0003}/>
              {R.c4983>0&&<PR code="4983" name="גמול מנהל" qty={`${Math.round(R.c4983/105)} יח׳`} rate="105 ₪" total={R.c4983}/>}
              {R.c0647>0&&<PR code="0647" name="גמול מנהל מחלקה א׳" total={R.c0647} note="קבוע"/>}
              <PR code="4550" name="תוספת 2001" qty="22%" rate={f(R.base)+" ₪"} total={R.c4550} note="22% × שכר בסיס"/>
              <PR code="4544" name="ת. שכר 3.6%" qty="3.6%" rate="—" total={R.c4544}/>
              <PR code="4934" name="תוספת 2009" qty="5%" total={R.c4934}/>
              <PR code="4994" name="תוספת 2011" qty="7.25%" total={R.c4994}/>
              <PR code="5401" name="תוספת 2016-נטו" qty="3.875%" total={R.c5401}/>
              <PR code="5402" name="שקלית 2016" total={R.c5402} note="קבוע"/>
              <PR code="5524" name="תוספת 2023" total={R.c5524} note="קבוע"/>
              <PR code="5533" name="תוספת 2024" qty="3.5%" total={R.c5533}/>
              {R.c1699>0&&<PR code="1699" name="תוספת חוק (השלמת מינימום)" total={R.c1699} note={`${f(MIN1699)} − ${f(R.minBase)} ₪`}/>}
              <PR name="סה״כ ברוטו קבוע (165)" total={R.grossFixed} hi/>

              {workTotal>0&&<>
                <SH title="עבודה נוספת" total={workTotal} color="bg-amber-50"/>
                {R.w1100>0&&<PR code="1100" name="שעות נוספות 100%" qty={ff(R.w1100/R.hourly)} rate={ff(R.hourly)+" ₪"} total={R.w1100}/>}
                {R.w1125>0&&<PR code="1125" name="שעות נוספות 125%" qty={ff(R.w1125/(R.hourly*1.25))} rate={ff(R.hourly*1.25)+" ₪"} total={R.w1125}/>}
                {R.w1150>0&&<PR code="1150" name="שעות נוספות 150%" qty={ff(R.w1150/(R.hourly*1.5))} rate={ff(R.hourly*1.5)+" ₪"} total={R.w1150}/>}
                {R.oncallPay>0&&<PR code="1205" name="גמול כוננות" qty={ff(R.oncallPay/(5.33*R.hourly))+" כוננ׳"} rate={ff(5.33*R.hourly)+" ₪"} total={R.oncallPay} note={`${ff(R.hourly)} ₪ × 5.33 שע׳`}/>}
                {R.w4322>0&&<PR code="4322" name="רכיב דיפרנציאלי" total={R.w4322}/>}
              </>}

              {R.expTotal>0&&<>
                <SH title="החזרי הוצאות" total={R.expTotal} color="bg-emerald-50"/>
                {R.exp0560>0&&<PR code="0560" name="קצובת נסיעה" total={R.exp0560} note="לפי מרחק מהבית"/>}
                {R.exp0700>0&&<PR code="0700" name="קרן שעות רכב" note="סכום קבוע לפי רמת רכב" total={R.exp0700}/>}
                {R.exp0750>0&&<PR code="0750" name="הוצ. רכב קבועות" note="סכום קבוע לפי רמת רכב" total={R.exp0750}/>}
                {R.exp1034>0&&<PR code="1034" name="משתנות רגלי" qty={ff(R.exp1034/0.68)+" ק״מ"} rate="0.68 ₪" total={R.exp1034}/>}
              </>}

              {(R.maonotPay>0||R.b4425>0||R.b5288>0||R.h11>0)&&<>
                <SH title="שונות" color="bg-purple-50"/>
                {R.maonotPay>0&&<PR code="4349" name="תוספת מעונות" qty={R.maonotCount+" ילד/ים"} rate={MAONOT_PER_CHILD+" ₪"} total={R.maonotPay} note="ילדים עד גיל 4"/>}
                {R.b4425>0&&<PR code="4425" name="מענק יובל" total={R.b4425}/>}
                {R.b5288>0&&<PR code="5288" name="מענק מיוחד" total={R.b5288}/>}
                {R.h11>0&&<PR code="H11" name="גילום מס על הוצאות" total={R.h11} note="חיפוש בינארי — שומר נטו הוצאות"/>}
                {R.code4150>0&&<PR code="4150" name="הפחתה פנסיונית" total={-R.code4150} neg note={`${(YEAR_CFG['2025'].rate4150*100).toFixed(2)}% × ${f(R.base165)} ₪`}/>}
                {R.c4112>0&&<PR code="4112" name="הפחתה — עבודה נוספת" total={-R.c4112} neg/>}
              </>}

              <TR cls="bg-blue-50 font-bold border-t-2 border-blue-300">
                <TD ch="" cls="w-12"/>
                <TD ch="ברוטו לתשלום" cls="font-black text-blue-900 text-sm"/>
                <TD ch=""/><TD ch=""/>
                <TD ch={f(R.gross)+" ₪"} cls="text-left font-black text-blue-900 text-sm tabular-nums"/>
              </TR>
            </tbody>
          </table>

          {/* ניכויים */}
          <div className="px-4 pt-4 pb-1">
            <div className="text-xs font-black text-gray-700 border-b-2 border-gray-400 pb-1">ניכויים</div>
          </div>
          <table className="w-full">
            <thead><TR><TH ch="קוד" cls="w-12"/><TH ch="רכיב"/><TH ch="%" cls="w-16 text-center"/><TH ch="בסיס" cls="w-20 text-center"/><TH ch="סכום" cls="w-20 text-left"/></TR></thead>
            <tbody>
              <SH title="ניכויי חובה" color="bg-red-50"/>
              {R.incomeTax>0&&<DR code="450/" name="מס הכנסה" base={f(R.gross)+" ₪"} total={R.incomeTax} note={`${R.pts?.toFixed(2)} נק׳ = ${f(R.pts*242)} ₪ זיכוי`}/>}
              <DR code="351/" name="ביטוח לאומי" base={f(R.gross)+" ₪"} total={r2(R.ni*0.37)}/>
              <DR code="352/" name="ביטוח בריאות" base={f(R.gross)+" ₪"} total={r2(R.ni*0.63)}/>
              <SH title="ניכויי קופות" color="bg-orange-50"/>
              <DR code="2200" name="קציבית (פנסיה)" pct="2" base={f(R.base165)+" ₪"} total={R.code2200}/>
              <DR code="6292" name="קופה/ביטוח 5% (הוצאות)" pct="5" base={f(R.base167)+" ₪"} total={R.code5}/>
              <DR code="6B22" name="קופה/ביטוח 7% (עבודה)" pct="7" base={f(R.base166)+" ₪"} total={R.code7}/>
              <DR code="6T22" name={`קופ גמל 2.5% (164)`} pct="2.5" base={f(R.base164)+" ₪"} total={R.code25}/>
              <SH title="ניכויים אישיים" color="bg-gray-50"/>
              <DR code="2310" name="ביטוח הדדי" total={R.mutual2310}/>
              <DR code="7546" name="ועד האוצר" pct="0.4" base={f(R.base165)+" ₪"} total={R.vaad7546}/>
              {R.dues>0&&<DR code="767x" name="דמי חבר" base={f(R.base165)+" ₪"} total={R.dues}/>}
              <TR cls="bg-red-50 border-t-2 border-red-300">
                <TD ch="" cls="w-12"/><TD ch='סה״כ ניכויים' cls="font-black text-red-900 text-sm"/>
                <TD ch=""/><TD ch=""/>
                <TD ch={"−"+f(R.totalDed)+" ₪"} cls="text-left font-black text-red-900 text-sm tabular-nums"/>
              </TR>
            </tbody>
          </table>

          {/* נטו */}
          <div className="mx-4 mt-3 mb-3 grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-xl p-3 text-center">
              <div className="text-xs text-red-600 mb-1">סה״כ ניכויים</div>
              <div className="text-xl font-black text-red-700">−{f(R.totalDed)} ₪</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-center">
              <div className="text-xs text-emerald-700 mb-1 font-bold">נטו לתשלום</div>
              <div className="text-2xl font-black text-emerald-700">{f(R.net)} ₪</div>
            </div>
          </div>

          {/* הפרשות מעסיק */}
          <div className="px-4 pb-1"><div className="text-xs font-black text-gray-700 border-b-2 border-gray-400 pb-1">הפרשות מעסיק (אינן מנוכות)</div></div>
          <table className="w-full mb-4">
            <thead><TR><TH ch="" cls="w-12"/><TH ch="רכיב"/><TH ch="%" cls="w-16 text-center"/><TH ch="בסיס" cls="w-20 text-center"/><TH ch="סכום" cls="w-20 text-left"/></TR></thead>
            <tbody>
              <ER name="פנסיה מעסיק (13.5%)" pct="13.5" base={f(R.base165)+" ₪"} total={R.empPension}/>
              <ER name="פיצויים (8.33%)" pct="8.33" base={f(R.base165)+" ₪"} total={r2(R.base165*0.0833)}/>
              <ER name={`קה״ש מעסיק (7.5%)`} pct="7.5" base={f(R.base164)+" ₪"} total={R.empStudy}/>
            </tbody>
          </table>

          <div className="mx-4 mb-4 bg-gray-50 rounded-xl border border-gray-200 p-3">
            <div className="text-xs font-bold text-gray-600 mb-2">נתוני עזר</div>
            <div className="grid grid-cols-3 gap-x-4 gap-y-1 text-xs text-gray-600">
              {[
                ["ערך שעה", ff(R.hourly)+" ₪"],
                ["165 ברוטו קבוע", f(R.base165)+" ₪"],
                ["166 עבודה נוספת", f(R.base166)+" ₪"],
                ["167 החזרי הוצאות", f(R.base167)+" ₪"],
                ["164 לקה״ש", f(R.base164)+" ₪"],
                ["310 לב.לאומי", f(R.gross)+" ₪"],
              ].map(([k,v])=><div key={k}><span className="text-gray-400">{k}: </span><span className="font-semibold">{v}</span></div>)}
            </div>
          </div>

          <div className="mx-4 mb-3 text-center text-xs text-gray-400 border-t border-gray-200 pt-2">
            * תלוש זה הוא <strong>סימולציה בלבד</strong> לצרכי תכנון | עדכני לשנת 2025
          </div>
        </div>
      )}

      {/* ── TAB 2: בסיסי חישוב ── */}
      {tab==="bases" && (
        <div className="p-4 space-y-3">
          <div className="grid grid-cols-2 gap-3">
            {[
              {title:"165 — ברוטו לפנסיה (קציבית)", val:f(R.base165)+" ₪", desc:"בסיס לחישוב 2200, קה״ש עובד/מעסיק, 7546 ועד", color:"border-blue-300 bg-blue-50"},
              {title:"166 — ברוטו עבודה נוספת", val:f(R.base166)+" ₪", desc:"בסיס לחישוב קופת 7%, 4112 הפחתה", color:"border-amber-300 bg-amber-50"},
              {title:"167 — ברוטו החזרי הוצאות", val:f(R.base167)+" ₪", desc:"בסיס לחישוב קופת 5%", color:"border-emerald-300 bg-emerald-50"},
              {title:"164 — ברוטו לקה״ש", val:f(R.base164)+" ₪", desc:"165 פחות 4150, 4854, 4970 — בסיס קופת 2.5%, קה״ש", color:"border-purple-300 bg-purple-50"},
              {title:"310 — ברוטו לביטוח לאומי", val:f(R.gross)+" ₪", desc:"ברוטו שוטף + זקיפות", color:"border-slate-300 bg-slate-50"},
              {title:"H11 — גילום מס על הוצאות", val:f(R.h11)+" ₪", desc:"חיפוש בינארי — מגן על נטו ההוצאות", color:R.h11>0?"border-violet-300 bg-violet-50":"border-gray-200 bg-gray-50"},
            ].map(b=>(
              <div key={b.title} className={`border-2 ${b.color} rounded-xl p-3`}>
                <div className="text-sm font-black text-gray-800 mb-1">{b.title}</div>
                <div className="text-2xl font-black text-gray-900 mb-1 tabular-nums">{b.val}</div>
                <div className="text-xs text-gray-500 leading-snug">{b.desc}</div>
              </div>
            ))}
          </div>
          <div className="bg-gray-50 rounded-xl border border-gray-200 p-3">
            <div className="text-xs font-bold text-gray-600 mb-2">שרשרת הצמיחה של הברוטו הקבוע (כדור שלג)</div>
            <div className="space-y-1 text-xs">
              {[
                ["0002+0003", "שכר בסיסי לפי ותק",      f(r2(R.v0002+R.v0003))],
                ["+4983+0647","גמולי מנהל",               f(r2(R.c4983+(R.c0647||0)))],
                ["+4550",     "22% × שכר בסיס",           f(R.c4550)],
                ["+4544",     "3.6% × בסיס מצטבר",       f(R.c4544)],
                ["+4934",     "5% × בסיס מצטבר",         f(R.c4934)],
                ["+4994",     "7.25% × בסיס מצטבר",      f(R.c4994)],
                ["+5401",     "3.875% × בסיס מצטבר",     f(R.c5401)],
                ["+5402+5524","קבועים שנתיים",            f(r2(R.c5402+R.c5524))],
                ["+5533",     "3.5% × בסיס מצטבר",       f(R.c5533)],
                [R.c1699>0?"+1699":"—", "השלמת מינימום", f(R.c1699)],
                ["= 165",     "ברוטו קבוע סופי",          f(R.grossFixed)+"  ✓"],
              ].map(([code,desc,val])=>(
                <div key={code} className="flex items-center gap-2 py-1 border-b border-gray-100 last:border-0 last:font-bold last:text-blue-700">
                  <span className="font-mono text-blue-500 w-20 shrink-0">{code}</span>
                  <span className="flex-1 text-gray-600">{desc}</span>
                  <span className="font-semibold tabular-nums">{val} ₪</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── TAB 3: הסבר ידידותי ── */}
      {tab==="explain" && (
        <div className="p-4 space-y-4">
          <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-4 text-white">
            <div className="text-sm opacity-80 mb-1">הכנסה חודשית נטו</div>
            <div className="text-4xl font-black">{f(R.net)} ₪</div>
            <div className="text-xs opacity-70 mt-1">מועבר לחשבון ב-1 לחודש</div>
          </div>

          <div className="bg-white border-2 border-gray-200 rounded-xl overflow-hidden">
            <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-200 text-sm font-bold text-gray-700">מאיפה מגיע הנטו?</div>
            {[
              {label:"השכר הבסיסי (0002+0003)", val:r2(R.v0002+R.v0003), color:"text-blue-600", bg:"bg-blue-50", icon:"📌"},
              {label:"שרשרת תוספות (כדור שלג)", val:r2(R.grossFixed-R.v0002-R.v0003), color:"text-indigo-600", bg:"", icon:"⛓️", note:`4983, 0647${R.c667>0?', 0667':''}${R.c897>0?', 0897':''}${R.c4147>0?', 4147':''}${(R.c1961||0)+(R.c1967||0)>0?', 1961/1967':''}, 4544, 4934, 4994, 5401, 5402, 5524, 5533, 1699`},
              ...(workTotal>0?[{label:"עבודה נוספת וכוננויות", val:workTotal, color:"text-amber-600", bg:"", icon:"⏱️"}]:[]),
              ...(R.expTotal>0?[{label:"החזרי הוצאות (נסיעות/רכב)", val:R.expTotal, color:"text-emerald-600", bg:"", icon:"🚗"}]:[]),
              ...(R.maonotPay>0?[{label:"תוספת מעונות", val:R.maonotPay, color:"text-pink-600", bg:"", icon:"👶"}]:[]),
              {label:"מינוס ניכויים (מס, ב.ל., קופות, ועד)", val:-R.totalDed, color:"text-red-600", bg:"bg-red-50", icon:"📤", neg:true},
            ].map((row,i)=>(
              <div key={i} className={`flex justify-between items-center px-4 py-2.5 border-b border-gray-100 last:border-0 ${row.bg}`}>
                <div className="flex items-center gap-2">
                  <span>{row.icon}</span>
                  <div>
                    <div className="text-sm font-medium text-gray-800">{row.label}</div>
                    {row.note&&<div className="text-xs text-gray-400">{row.note}</div>}
                  </div>
                </div>
                <span className={`font-black text-base tabular-nums ${row.color}`}>
                  {row.neg?"−":"+"}  {f(Math.abs(row.val))} ₪
                </span>
              </div>
            ))}
            <div className="flex justify-between items-center px-4 py-3 bg-emerald-50 border-t-2 border-emerald-300">
              <span className="font-black text-emerald-800">= נטו לתשלום</span>
              <span className="font-black text-2xl text-emerald-700 tabular-nums">{f(R.net)} ₪</span>
            </div>
          </div>

          <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-4">
            <div className="text-sm font-bold text-amber-800 mb-2">💼 שווי כלכלי כולל: {f(R.econVal)} ₪/חודש</div>
            <div className="text-xs text-amber-700 leading-relaxed">
              מעבר לנטו, החבילה כוללת גם הפרשות מעסיק לפנסיה ({f(R.empPension)} ₪) 
              ולקה״ש ({f(R.empStudy)} ₪), דמי הבראה ועוד הטבות שנלקחו בחשבון.
            </div>
          </div>

          <div className="bg-gray-50 border border-gray-200 rounded-xl p-4">
            <div className="text-sm font-bold text-gray-700 mb-2">🎓 מה זה "שרשרת כדור שלג"?</div>
            <div className="text-xs text-gray-600 leading-relaxed space-y-1">
              <p>בדירוג המינהלי, השכר הקבוע (165) לא מחושב ישירות — כל תוספת בנויה על הקודמת ומגדילה את הבסיס לחישוב הבאה.</p>
              <p>למשל: 4550 מוסיפה 22% על השכר הבסיסי → 4544 לוקחת 3.6% על הסכום המצטבר → 4934 לוקחת 5% על הסכום הגדול יותר... וכך הלאה.</p>
              <p>התוצאה: הברוטו הקבוע ({f(R.grossFixed)} ₪) גבוה משמעותית מהשכר הטבלאי ({f(R.base)} ₪).</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const StickyBar = ({R, ACCENT}) => {
  const [atBottom, setAtBottom] = useState(false);
  useEffect(()=>{
    const onScroll=()=>{const a=document.getElementById('contact-anchor');if(a){const r=a.getBoundingClientRect();setAtBottom(r.top<window.innerHeight);}};
    window.addEventListener('scroll',onScroll,{passive:true});onScroll();return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  return (
    <div className={`fixed bottom-0 left-0 right-0 z-50 transition-all duration-500 no-print ${atBottom?'opacity-0 pointer-events-none translate-y-2':'opacity-100'}`}>
      <div className={`bg-gradient-to-l ${ACCENT} shadow-2xl border-t border-white/10`}>
        <div className="max-w-7xl mx-auto px-4 py-2.5 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center"><Ico.Calc c="w-4 h-4 text-white"/></div>
            <div className="text-white"><div className="text-xs font-bold">סימולטור Pro — לחשב שכר</div><div className="text-xs opacity-70">רטרו • הפרשים • ייצוא CSV</div></div>
          </div>
          <div className="flex items-center gap-4 text-white">
            <div className="text-center"><div className="text-xs opacity-70">נטו</div><div className="font-extrabold text-lg">{fmt(R.net)} ₪</div></div>
            <div className="w-px h-8 bg-white/20"/>

// PRO ENGINE — RETRO / DELTA / EXPORT
// ═══════════════════════════════════════════════════════════

// שיעורי ריבית/הצמדה ברירת מחדל לפי שנה (ניתן לעדכן ידנית)
const DEFAULT_INTEREST_RATES = {
  '2019':{ annual:0.0 }, '2020':{ annual:0.0 }, '2021':{ annual:0.0 },
  '2022':{ annual:4.0 }, '2023':{ annual:5.5 }, '2024':{ annual:4.5 },
  '2025':{ annual:3.5 }, '2026':{ annual:3.5 },
};

// חישוב מקדם ריבית/הצמדה עבור חודש ספציפי עד היום
function calcInterestFactor(yearStr, monthNum, annualRate) {
  const now = new Date();
  const start = new Date(parseInt(yearStr), monthNum - 1, 1);
  const diffMs = now - start;
  const diffYears = Math.max(0, diffMs / (1000 * 60 * 60 * 24 * 365.25));
  const rate = (annualRate != null ? annualRate : (DEFAULT_INTEREST_RATES[yearStr]?.annual || 0)) / 100;
  return Math.pow(1 + rate, diffYears);
}

// delta בין שני חישובים
function calcDelta(original, corrected) {
  return {
    gross:     r2((corrected.gross||0)     - (original.gross||0)),
    net:       r2((corrected.net||0)       - (original.net||0)),
    incomeTax: r2((corrected.incomeTax||0) - (original.incomeTax||0)),
    ni:        r2((corrected.ni||0)        - (original.ni||0)),
    totalDed:  r2((corrected.totalDed||0)  - (original.totalDed||0)),
    base165:   r2((corrected.base165||0)   - (original.base165||0)),
    grossFixed:r2((corrected.grossFixed||0)- (original.grossFixed||0)),
    empPension:r2((corrected.empPension||0)- (original.empPension||0)),
    empStudy:  r2((corrected.empStudy||0)  - (original.empStudy||0)),
  };
}

// הרצת רטרו על טווח חודשים
function runRetro({ startYear, startMonth, endYear, endMonth, originalParams, correctedParams, annualRate }) {
  const months = [];
  let y = parseInt(startYear), m = parseInt(startMonth);
  const ey = parseInt(endYear), em = parseInt(endMonth);
  while (y < ey || (y === ey && m <= em)) {
    const factor = calcInterestFactor(String(y), m, annualRate);
    const orig = calcAll({ ...originalParams, year: String(y < 2025 ? 2025 : y) });
    const corr = calcAll({ ...correctedParams, year: String(y < 2025 ? 2025 : y) });
    const delta = calcDelta(orig, corr);
    months.push({ year: y, month: m, original: orig, corrected: corr, delta, factor,
      deltaNetWithInterest: r2(delta.net * factor),
      deltaGrossWithInterest: r2(delta.gross * factor),
    });
    m++; if (m > 12) { m = 1; y++; }
  }
  const totalDeltaNet  = r2(months.reduce((s,m)=>s+m.delta.net,0));
  const totalDeltaGross= r2(months.reduce((s,m)=>s+m.delta.gross,0));
  const totalWithInt   = r2(months.reduce((s,m)=>s+m.deltaNetWithInterest,0));
  const totalGrossInt  = r2(months.reduce((s,m)=>s+m.deltaGrossWithInterest,0));
  return { months, totalDeltaNet, totalDeltaGross, totalWithInt, totalGrossInt };
}

// ייצוא CSV
function exportRetroCSV(retroResult) {
  const MONTHS_HE = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const headers = ['חודש','שנה','ברוטו מקורי','ברוטו מעודכן','הפרש ברוטו','נטו מקורי','נטו מעודכן','הפרש נטו','מקדם הצמדה','הפרש נטו+הצמדה'];
  const rows = retroResult.months.map(m => [
    MONTHS_HE[m.month], m.year,
    m.original.gross, m.corrected.gross, m.delta.gross,
    m.original.net, m.corrected.net, m.delta.net,
    m.factor.toFixed(4), m.deltaNetWithInterest
  ]);
  const totals = ['סה״כ','',
    retroResult.months.reduce((s,m)=>s+m.original.gross,0).toFixed(2),
    retroResult.months.reduce((s,m)=>s+m.corrected.gross,0).toFixed(2),
    retroResult.totalDeltaGross,
    retroResult.months.reduce((s,m)=>s+m.original.net,0).toFixed(2),
    retroResult.months.reduce((s,m)=>s+m.corrected.net,0).toFixed(2),
    retroResult.totalDeltaNet,'',retroResult.totalWithInt
  ];
  const csv = [headers, ...rows, totals].map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='retro-salary.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ייצוא XLSX
function exportRetroXLSX(retroResult) {
  const MONTHS_HE_X = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const WB = XLSX.utils.book_new();

  // Sheet 1 — monthly detail
  const rows = retroResult.months.map(m => ({
    'חודש': MONTHS_HE_X[m.month], 'שנה': m.year,
    'ברוטו מקורי': m.original.gross, 'ברוטו מעודכן': m.corrected.gross, 'הפרש ברוטו': m.delta.gross,
    'נטו מקורי':   m.original.net,   'נטו מעודכן':   m.corrected.net,   'הפרש נטו':   m.delta.net,
    'מקדם הצמדה':  parseFloat(m.factor.toFixed(4)),
    'הפרש נטו+הצמדה': m.deltaNetWithInterest,
  }));
  // totals row
  rows.push({
    'חודש': 'סה״כ', 'שנה': '',
    'ברוטו מקורי': r2(retroResult.months.reduce((s,m)=>s+m.original.gross,0)),
    'ברוטו מעודכן': r2(retroResult.months.reduce((s,m)=>s+m.corrected.gross,0)),
    'הפרש ברוטו': retroResult.totalDeltaGross,
    'נטו מקורי': r2(retroResult.months.reduce((s,m)=>s+m.original.net,0)),
    'נטו מעודכן': r2(retroResult.months.reduce((s,m)=>s+m.corrected.net,0)),
    'הפרש נטו': retroResult.totalDeltaNet,
    'מקדם הצמדה': '',
    'הפרש נטו+הצמדה': retroResult.totalWithInt,
  });
  const ws1 = XLSX.utils.json_to_sheet(rows);
  ws1['!cols'] = Array(10).fill({ wch: 16 });
  XLSX.utils.book_append_sheet(WB, ws1, 'פירוט חודשי');

  // Sheet 2 — yearly summary
  const byY = {};
  retroResult.months.forEach(m => {
    if (!byY[m.year]) byY[m.year] = { 'שנה': m.year, 'חודשים': 0, 'הפרש נטו': 0, 'הפרש ברוטו': 0, 'נטו+הצמדה': 0 };
    byY[m.year]['חודשים']++;
    byY[m.year]['הפרש נטו']   = r2(byY[m.year]['הפרש נטו']   + m.delta.net);
    byY[m.year]['הפרש ברוטו'] = r2(byY[m.year]['הפרש ברוטו'] + m.delta.gross);
    byY[m.year]['נטו+הצמדה']  = r2(byY[m.year]['נטו+הצמדה']  + m.deltaNetWithInterest);
  });
  const ws2 = XLSX.utils.json_to_sheet(Object.values(byY));
  ws2['!cols'] = Array(5).fill({ wch: 16 });
  XLSX.utils.book_append_sheet(WB, ws2, 'סיכום שנתי');

  XLSX.writeFile(WB, 'retro-salary.xlsx');
}

          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white rounded-2xl border border-slate-200 p-3 text-center shadow-sm">
              <div className="text-xs text-slate-500 mb-1">הפרש ברוטו כולל</div>
              <div className="text-xl font-bold text-slate-800">{fmt(retroResult.totalDeltaGross)} ₪</div>
            </div>
            <div className="bg-white rounded-2xl border border-slate-200 p-3 text-center shadow-sm">
              <div className="text-xs text-slate-500 mb-1">ברוטו + הצמדה</div>
              <div className="text-xl font-bold text-slate-800">{fmt(retroResult.totalGrossInt)} ₪</div>
            </div>
          </div>

          {/* סיכום לפי שנה */}
          {byYear.length > 1 && (
            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-700">📅 סיכום לפי שנה</div>
              <div className="divide-y divide-slate-100">
                {byYear.map((yr,i)=>(
                  <div key={i} className="flex items-center px-4 py-2.5 gap-3 text-sm">
                    <span className="font-bold text-slate-800 w-12">{yr.year}</span>
                    <span className="text-slate-500 text-xs">{yr.months} חודשים</span>
                    <div className="flex gap-4 mr-auto text-xs">
                      <div className="text-center"><div className="text-slate-400">Δ נטו</div><div className={`font-bold ${yr.deltaNet>=0?'text-emerald-700':'text-red-600'}`}>{yr.deltaNet>=0?'+':''}{fmt(yr.deltaNet)}</div></div>
                      <div className="text-center"><div className="text-slate-400">Δ ברוטו</div><div className="font-bold text-slate-700">{yr.deltaGross>=0?'+':''}{fmt(yr.deltaGross)}</div></div>
                      {interestMode!=='none' && <div className="text-center"><div className="text-slate-400">+הצמדה</div><div className="font-bold text-amber-700">+{fmt(yr.deltaWithInt)}</div></div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* כפתורי פעולה */}
          <div className="flex gap-2 flex-wrap">
            <button onClick={()=>setShowDetail(!showDetail)}
              className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition-all border border-slate-200 min-w-28">
              {showDetail?'▲ הסתר':'▼ פירוט חודשי'}
            </button>
            <button onClick={()=>exportRetroCSV(retroResult)}
              className="flex-1 py-2.5 bg-slate-600 hover:bg-slate-700 text-white rounded-xl font-bold text-sm transition-all shadow flex items-center justify-center gap-1 min-w-28">
              📄 CSV
            </button>
            <button onClick={()=>exportRetroXLSX(retroResult)}
              className="flex-1 py-2.5 bg-gradient-to-l from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white rounded-xl font-bold text-sm transition-all shadow flex items-center justify-center gap-1 min-w-28">
              📊 Excel
            </button>
          </div>

          {/* טבלת פירוט */}
          {showDetail && (
            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="px-4 py-2.5 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-700">
                פירוט לפי חודש
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead className="bg-slate-100">
                    <tr>
                      {['חודש','ברוטו מקורי','ברוטו מעודכן','הפרש ברוטו','נטו מקורי','נטו מעודכן','הפרש נטו','× הצמדה','הפרש+הצמדה'].map(h=>(
                        <th key={h} className="px-2 py-2 text-right font-bold text-slate-600 whitespace-nowrap">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {retroResult.months.map((m,i)=>(
                      <tr key={i} className={`border-b border-slate-100 ${i%2===0?'bg-white':'bg-slate-50'}`}>
                        <td className="px-2 py-1.5 font-medium whitespace-nowrap">{MONTHS_HE[m.month]} {m.year}</td>
                        <td className="px-2 py-1.5 font-mono text-slate-700">{fmt(m.original.gross)}</td>
                        <td className="px-2 py-1.5 font-mono text-blue-700">{fmt(m.corrected.gross)}</td>
                        <td className={`px-2 py-1.5 font-mono font-bold ${m.delta.gross>=0?'text-emerald-700':'text-red-600'}`}>{m.delta.gross>=0?'+':''}{fmt(m.delta.gross)}</td>
                        <td className="px-2 py-1.5 font-mono text-slate-700">{fmt(m.original.net)}</td>
                        <td className="px-2 py-1.5 font-mono text-blue-700">{fmt(m.corrected.net)}</td>
                        <td className={`px-2 py-1.5 font-mono font-bold ${m.delta.net>=0?'text-emerald-700':'text-red-600'}`}>{m.delta.net>=0?'+':''}{fmt(m.delta.net)}</td>
                        <td className="px-2 py-1.5 font-mono text-slate-500">{m.factor.toFixed(3)}</td>
                        <td className={`px-2 py-1.5 font-mono font-bold ${m.deltaNetWithInterest>=0?'text-amber-700':'text-red-600'}`}>{m.deltaNetWithInterest>=0?'+':''}{fmt(m.deltaNetWithInterest)}</td>
                      </tr>
                    ))}
                    <tr className="bg-rose-50 border-t-2 border-rose-300 font-bold">
                      <td className="px-2 py-2 font-bold text-rose-800">סה״כ</td>
                      <td className="px-2 py-2 font-mono">{fmt(retroResult.months.reduce((s,m)=>s+m.original.gross,0))}</td>
                      <td className="px-2 py-2 font-mono text-blue-700">{fmt(retroResult.months.reduce((s,m)=>s+m.corrected.gross,0))}</td>
                      <td className="px-2 py-2 font-mono text-emerald-700">+{fmt(retroResult.totalDeltaGross)}</td>
                      <td className="px-2 py-2 font-mono">{fmt(retroResult.months.reduce((s,m)=>s+m.original.net,0))}</td>
                      <td className="px-2 py-2 font-mono text-blue-700">{fmt(retroResult.months.reduce((s,m)=>s+m.corrected.net,0))}</td>
                      <td className="px-2 py-2 font-mono text-emerald-700">+{fmt(retroResult.totalDeltaNet)}</td>
                      <td className="px-2 py-2"/>
                      <td className="px-2 py-2 font-mono text-amber-700">+{fmt(retroResult.totalWithInt)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// SCENARIO COMPARE COMPONENT
// ═══════════════════════════════════════════════════════════
const ScenarioCompare = ({ baseParams, baseResult }) => {
  const [altGrade, setAltGrade] = useState(baseParams.gradeKey);
  const [altVatek, setAltVatek] = useState(baseParams.vatek);
  const [altMgmt,  setAltMgmt]  = useState(baseParams.mgmtUnits);
  const [alt667,   setAlt667]   = useState(baseParams.inc667||false);
  const [alt897,   setAlt897]   = useState(baseParams.inc897||false);
  const [altR4147, setAltR4147] = useState(baseParams.reforma4147||false);
  const [altRB,    setAltRB]    = useState(baseParams.reformaB||false);

  const altParams = { ...baseParams, gradeKey: altGrade, vatek: altVatek, mgmtUnits: altMgmt,
    inc667: alt667, inc897: alt897, reforma4147: altR4147, reformaB: altRB };
  const altResult = useMemo(()=>calcAll(altParams), [JSON.stringify(altParams)]);

  const diff = (a,b)=>r2((b||0)-(a||0));
  const rows = [
    { label:'ברוטו קבוע (165)', a:baseResult.grossFixed, b:altResult.grossFixed },
    { label:'ברוטו כולל',        a:baseResult.gross,      b:altResult.gross },
    { label:'נטו לתשלום',        a:baseResult.net,        b:altResult.net },
    { label:'מס הכנסה',          a:baseResult.incomeTax,  b:altResult.incomeTax },
    { label:'שווי כלכלי',        a:baseResult.econVal,    b:altResult.econVal },
    { label:'פנסיה מעסיק',       a:baseResult.empPension, b:altResult.empPension },
  ];

  return (
    <div className="space-y-4">
      <div className="bg-gradient-to-r from-indigo-600 to-violet-700 rounded-2xl p-4 text-white">
        <h3 className="text-lg font-extrabold mb-1">⚖️ השוואת תרחישים</h3>
        <p className="text-indigo-100 text-xs">השווה בין הפרופיל הנוכחי לתרחיש חלופי</p>
      </div>

      {/* תרחיש חלופי */}
      <div className="bg-white rounded-2xl border border-indigo-200 p-4 shadow-sm">
        <div className="text-sm font-bold text-indigo-700 mb-3">תרחיש ב׳ — ערכי השוואה</div>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label className="text-xs text-slate-500 mb-1 block">דרגה</label>
            <select value={altGrade} onChange={e=>setAltGrade(e.target.value)} className="w-full border-2 border-indigo-200 rounded-xl py-2 px-2 text-sm font-bold focus:ring-2 focus:ring-indigo-400">
              {GRADE_OPTIONS.map(([k,l])=><option key={k} value={k}>דרגה {l}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs text-slate-500 mb-1 block">ותק</label>
            <input value={altVatek} onChange={e=>setAltVatek(e.target.value)}
              className="w-full border-2 border-indigo-200 rounded-xl py-2 px-3 text-sm font-bold focus:ring-2 focus:ring-indigo-400"/>
          </div>
        </div>
        <div className="mb-2">
          <label className="text-xs text-slate-500 mb-1 block">יח׳ גמול מנהל</label>
          <div className="grid grid-cols-4 gap-1">
            {[0,1,2,3].map(n=>(
              <button key={n} onClick={()=>setAltMgmt(n)} className={`py-2 rounded-xl border-2 text-xs font-bold transition-all ${altMgmt===n?'bg-indigo-500 text-white border-transparent':'bg-slate-50 border-slate-200'}`}>{n} יח׳</button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 text-xs">
          {[
            [alt667, setAlt667, '0667 השתלמות א׳'],
            [alt897, setAlt897, '0897 השתלמות ב׳'],
            [altR4147, setAltR4147, '4147 רפורמה'],
            [altRB, setAltRB, 'רפורמה ב׳'],
          ].map(([val,set,label],i)=>(
            <label key={i} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer border ${val?'border-indigo-300 bg-indigo-50':'border-slate-200'}`}>
              <input type="checkbox" checked={val} onChange={e=>set(e.target.checked)} className="w-3.5 h-3.5"/>
              <span>{label}</span>
            </label>
          ))}
        </div>
      </div>

      {/* טבלת השוואה */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
        <div className="grid grid-cols-4 gap-0 bg-slate-100 border-b border-slate-200 text-xs font-bold text-slate-600">
          <div className="px-3 py-2.5">רכיב</div>
          <div className="px-3 py-2.5 text-center">תרחיש א׳</div>
          <div className="px-3 py-2.5 text-center">תרחיש ב׳</div>
          <div className="px-3 py-2.5 text-center">הפרש</div>
        </div>
        {rows.map((row,i)=>{
          const d = diff(row.a, row.b);
          return (
            <div key={i} className={`grid grid-cols-4 gap-0 border-b border-slate-100 ${i%2===0?'bg-white':'bg-slate-50'}`}>
              <div className="px-3 py-2.5 text-sm text-slate-600">{row.label}</div>
              <div className="px-3 py-2.5 text-sm font-mono text-center text-slate-700">{fmt(row.a)}</div>
              <div className="px-3 py-2.5 text-sm font-mono text-center text-blue-700">{fmt(row.b)}</div>
              <div className={`px-3 py-2.5 text-sm font-mono font-bold text-center ${d>0?'text-emerald-700':d<0?'text-red-600':'text-slate-400'}`}>
                {d>0?'+':d<0?'-':''}{fmt(Math.abs(d))}
              </div>
            </div>
          );
        })}
      </div>

      {/* diff summary — monthly + annual */}
      {(() => {
        const dNet   = diff(baseResult.net, altResult.net);
        const dGross = diff(baseResult.gross, altResult.gross);
        const dEcon  = diff(baseResult.econVal, altResult.econVal);
        const isPos  = dNet >= 0;
        return (
          <div className={`rounded-2xl p-5 ${isPos?'bg-emerald-50 border-2 border-emerald-200':'bg-red-50 border-2 border-red-200'}`}>
            <div className="text-xs font-bold text-slate-500 mb-3 text-center">סיכום הפרשים</div>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div>
                <div className="text-xs text-slate-500 mb-1">Δ נטו חודשי</div>
                <div className={`text-2xl font-extrabold ${isPos?'text-emerald-700':'text-red-600'}`}>
                  {dNet>=0?'+':''}{fmt(dNet)} ₪
                </div>
              </div>
              <div>
                <div className="text-xs text-slate-500 mb-1">Δ נטו שנתי</div>
                <div className={`text-2xl font-extrabold ${isPos?'text-emerald-700':'text-red-600'}`}>
                  {dNet>=0?'+':''}{fmt(dNet*12)} ₪
                </div>
              </div>
              <div>
                <div className="text-xs text-slate-500 mb-1">Δ שווי כלכלי</div>
                <div className={`text-2xl font-extrabold ${dEcon>=0?'text-blue-700':'text-red-600'}`}>
                  {dEcon>=0?'+':''}{fmt(dEcon*12)} ₪
                </div>
                <div className="text-xs text-slate-400">שנתי</div>
              </div>
            </div>
            <div className="mt-3 pt-3 border-t border-slate-200 text-center">
              <span className="text-xs text-slate-500">עלות מעסיק (ברוטו×6): </span>
              <span className="text-xs font-bold text-slate-700">{fmt(Math.abs(dGross)*12*6)} ₪ לשש שנים</span>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// COMPONENT EXPLORER — Rule Explorer
// ═══════════════════════════════════════════════════════════
const ComponentExplorer = ({ result }) => {
  const [filter, setFilter] = useState('all');
  const comps = result.components || [];
  const filtered = filter === 'all' ? comps
    : filter === '165' ? comps.filter(c=>c.base165)
    : filter === '166' ? comps.filter(c=>c.base166)
    : filter === '167' ? comps.filter(c=>c.base167)
    : comps.filter(c=>c.taxable);

  return (
    <div className="space-y-4">
      <div className="bg-gradient-to-r from-slate-700 to-slate-900 rounded-2xl p-4 text-white">
        <h3 className="text-lg font-extrabold mb-1">🔍 סייר רכיבים ובסיסים</h3>
        <p className="text-slate-300 text-xs">כל רכיב שכר עם הסיווג שלו לבסיסים</p>
      </div>

      <div className="flex gap-2 flex-wrap">
        {[{v:'all',l:'הכל'},{v:'165',l:'165 קבוע'},{v:'166',l:'166 עבודה'},{v:'167',l:'167 הוצאות'},{v:'tax',l:'חייב מס'}].map(f=>(
          <button key={f.v} onClick={()=>setFilter(f.v)}
            className={`py-1.5 px-3 rounded-xl border-2 text-xs font-bold transition-all ${filter===f.v?'bg-slate-800 text-white border-transparent':'bg-white border-slate-200 text-slate-600 hover:border-slate-400'}`}>
            {f.l}
          </button>
        ))}
      </div>

      {/* טבלת רכיבים */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
        <div className="grid grid-cols-6 gap-0 bg-slate-100 border-b border-slate-200 text-xs font-bold text-slate-600">
          {['קוד','שם','סכום','165','166','167'].map(h=>(
            <div key={h} className="px-2 py-2.5 text-center">{h}</div>
          ))}
        </div>
        {filtered.map((c,i)=>(
          <div key={i} className={`grid grid-cols-6 gap-0 border-b border-slate-100 text-xs ${i%2===0?'bg-white':'bg-slate-50'}`}>
            <div className="px-2 py-2 font-mono text-slate-500 text-center">{c.code}</div>
            <div className="px-2 py-2 text-slate-700 text-xs truncate">{c.label}</div>
            <div className="px-2 py-2 font-mono font-bold text-slate-800 text-center">{fmt(c.amount)}</div>
            <div className="px-2 py-2 text-center">{c.base165?<span className="text-emerald-600 font-bold">✓</span>:<span className="text-slate-300">—</span>}</div>
            <div className="px-2 py-2 text-center">{c.base166?<span className="text-amber-600 font-bold">✓</span>:<span className="text-slate-300">—</span>}</div>
            <div className="px-2 py-2 text-center">{c.base167?<span className="text-blue-600 font-bold">✓</span>:<span className="text-slate-300">—</span>}</div>
          </div>
        ))}
        <div className="grid grid-cols-6 gap-0 bg-slate-100 border-t-2 border-slate-300 text-xs font-bold">
          <div className="px-2 py-2 col-span-2 text-slate-700">סה״כ</div>
          <div className="px-2 py-2 font-mono text-slate-800 text-center">{fmt(filtered.reduce((s,c)=>s+c.amount,0))}</div>
          <div className="px-2 py-2 text-center text-emerald-700">{fmt(result.base165)}</div>
          <div className="px-2 py-2 text-center text-amber-700">{fmt(result.base166)}</div>
          <div className="px-2 py-2 text-center text-blue-700">{fmt(result.base167)}</div>
        </div>
      </div>

      {/* שרשרת כדור שלג — Audit Trail */}
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
        <div className="px-4 py-2.5 bg-gradient-to-l from-emerald-50 to-teal-50 border-b border-slate-200 text-xs font-bold text-emerald-800">
          ⛓️ שרשרת כדור שלג — בניית בסיס 165
        </div>
        <div className="p-3 space-y-1 text-xs">
          {(() => {
            const chain = [
              { label:'0002 שכר יסוד', val:result.v0002, running:result.v0002 },
              { label:'0003 תוספת ותק', val:result.v0003, running:r2(result.v0002+result.v0003) },
              ...(result.c4983>0?[{ label:'4983 גמול מנהל', val:result.c4983, running:null }]:[]),
              ...(result.c0647>0?[{ label:'0647 גמול מחלקה', val:result.c0647, running:null }]:[]),
              ...(result.c667>0?[{ label:'0667 השתלמות א׳', val:result.c667, running:null }]:[]),
              ...(result.c897>0?[{ label:'0897 השתלמות ב׳', val:result.c897, running:null }]:[]),
              ...(result.c4147>0?[{ label:'4147 רפורמה', val:result.c4147, running:null }]:[]),
              ...((result.c1961||0)+(result.c1967||0)>0?[{ label:'1961+1967 רפורמה ב׳', val:r2((result.c1961||0)+(result.c1967||0)), running:null }]:[]),
              { label:'4550 תוספת 2001 (22%)', val:result.c4550, running:null },
              { label:'4544 ת. שכר 3.6%', val:result.c4544, running:null },
              { label:'4934 תוספת 2009 (5%)', val:result.c4934, running:null },
              { label:'4994 תוספת 2011 (7.25%)', val:result.c4994, running:null },
              { label:'5401 2016-נטו (3.875%)', val:result.c5401, running:null },
              { label:'5402 שקל 2016', val:result.c5402, running:null },
              { label:'5524 תוספת 2023', val:result.c5524, running:null },
              { label:'5533 תוספת אחידה (3.5%)', val:result.c5533, running:null },
              ...(result.c1699>0?[{ label:'1699 תוספת חוק (מינימום)', val:result.c1699, running:null }]:[]),
            ].filter(r=>r.val>0);
            let running = 0;
            return chain.map((row,i)=>{
              running = r2(running + row.val);
              return (
                <div key={i} className="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-slate-50">
                  <span className="text-emerald-600 font-bold text-xs w-3">+</span>
                  <span className="text-slate-700 flex-1">{row.label}</span>
                  <span className="font-mono font-bold text-slate-800">{fmt(row.val)}</span>
                  <span className="font-mono text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded text-xs">{fmt(running)}</span>
                </div>
              );
            });
          })()}
          <div className="border-t-2 border-emerald-300 pt-2 mt-2 flex justify-between items-center px-2 font-bold">
            <span className="text-emerald-800">= בסיס 165 (ברוטו קבוע)</span>
            <span className="text-2xl text-emerald-700 font-extrabold">{fmt(result.grossFixed)} ₪</span>
          </div>
        </div>
      </div>

      {/* סיכום בסיסים */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        {[
          { label:'165 קבוע', val:result.base165, clr:'from-emerald-500 to-teal-600', note:'שכר+גמולים' },
          { label:'166 עבודה', val:result.base166, clr:'from-amber-500 to-orange-600', note:'שעות/כוננות' },
          { label:'167 הוצאות', val:result.base167, clr:'from-blue-500 to-indigo-600', note:'רכב/נסיעות' },
          { label:'164 לקופות', val:result.base164, clr:'from-violet-500 to-purple-600', note:'165 − 4150' },
        ].map((b,i)=>(
          <div key={i} className={`bg-gradient-to-br ${b.clr} rounded-xl p-3 text-white text-center shadow`}>
            <div className="text-xs opacity-80">{b.label}</div>
            <div className="text-xl font-extrabold">{fmt(b.val)} ₪</div>
            <div className="text-xs opacity-70">{b.note}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
